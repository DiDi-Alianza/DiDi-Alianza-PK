<!DOCTYPE html>
<html lang="zh">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiDi Alianza · 结算指挥台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
 --ink:#13151B;--panel:#1A1D26;--panel2:#21242F;--line:#2B2F3C;--txt:#E9EBF2;--mut:#8C92A4;--mut2:#646A7A;
 --orange:#FF7A00;--green:#43B581;--red:#E5564E;--amber:#F0A93B;--blue:#5B8DEF;--violet:#9B7BE0;
 --disp:'Space Grotesk',sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;color:var(--txt);font-family:var(--body);overflow-x:hidden}
body{padding:14px 16px 30px}
a{color:inherit}
.wrap{max-width:1480px;margin:0 auto}
/* header */
.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#FF7A00,#FF9A3D);display:flex;align-items:center;justify-content:center;font-weight:800;color:#1a1100;font-family:var(--disp);font-size:20px}
.h1{font-family:var(--disp);font-weight:700;font-size:22px}
.sub{font-size:12px;color:var(--mut)}
.spacer{flex:1}
.wksel{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut)}
.wksel select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.livebanner{margin:10px 0 4px;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--line)}
.livebanner.ok{background:rgba(67,181,129,.12);color:#7fd6a8;border-color:rgba(67,181,129,.3)}
.livebanner.bad{background:rgba(229,86,78,.12);color:#f0a39d;border-color:rgba(229,86,78,.3)}
.livebanner.warn{background:rgba(240,169,59,.12);color:#f0c98a;border-color:rgba(240,169,59,.3)}
#unsettledNote{margin:6px 0 4px;padding:10px 14px;border-radius:10px;font-size:12.5px;background:rgba(240,169,59,.1);border:1px solid rgba(240,169,59,.28);color:#e7c489;line-height:1.6}
#archiveDupeNote{margin:6px 0 4px;padding:10px 14px;border-radius:10px;font-size:12.5px;background:rgba(229,86,78,.12);border:1px solid rgba(229,86,78,.35);color:#f0a39d;line-height:1.7}
#archiveDupeNote b{color:#ffb3ad}
#archiveDupeNote .adlink{display:inline-block;margin-top:6px;font-size:11.5px;font-weight:600;color:var(--red);background:rgba(229,86,78,.12);border:1px solid rgba(229,86,78,.4);border-radius:8px;padding:3px 10px;cursor:pointer}
#archiveDupeNote .adlink:hover{background:rgba(229,86,78,.2)}
.cflaunch{font-size:12.5px;font-weight:700;color:var(--red);background:rgba(229,86,78,.1);border:1px solid rgba(229,86,78,.4);border-radius:10px;padding:7px 14px;cursor:pointer;font-family:var(--ui)}
.cflaunch:hover{background:rgba(229,86,78,.18)}
#cheatFixOut{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.cfhead{font-size:14px;font-weight:800;color:#f0a39d;margin-bottom:10px}
.cfsum{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin-bottom:10px}
.cfsum>div{background:var(--card2,rgba(255,255,255,.02));border:1px solid var(--line);border-radius:10px;padding:9px 11px}
.cfsum span{display:block;font-size:11px;color:var(--mut2);margin-bottom:3px;line-height:1.4}
.cfsum b{font-size:15px;font-weight:800}
.cfg{color:var(--green)} .cfr{color:var(--red)}
.cflim{font-size:11px;color:#cdb389;background:rgba(240,169,59,.08);border:1px solid rgba(240,169,59,.25);border-radius:9px;padding:8px 11px;line-height:1.6;margin-bottom:10px}
.cfsub{font-size:11px;color:var(--mut2);margin:6px 0 4px}
.cfchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.cfchip{background:rgba(229,86,78,.1);border:1px solid rgba(229,86,78,.32);border-radius:20px;padding:2px 9px;font-size:11px}
.cfchip b{color:var(--red)}
.cftblwrap{overflow:auto;max-height:360px;border:1px solid var(--line);border-radius:8px}
.cftbl{width:100%;font-size:11px;border-collapse:collapse}
.cftbl th{position:sticky;top:0;background:var(--panel);padding:6px 8px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;color:var(--mut2)}
.cftbl td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
.cftbl td.num{text-align:right;font-variant-numeric:tabular-nums}
.cftbl tr.cfanom td{background:rgba(229,86,78,.08)}
.cfbadge{font-size:9.5px;color:var(--red);border:1px solid rgba(229,86,78,.4);border-radius:6px;padding:1px 5px}
.cfbadge2{font-size:9.5px;color:var(--mut2);border:1px solid var(--line);border-radius:6px;padding:1px 5px}
.cfmore{font-size:11px;color:var(--mut2);margin-top:6px}
.cfdl{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.cfbtn{font-size:11.5px;font-weight:600;color:var(--orange);background:rgba(255,122,0,.1);border:1px solid rgba(255,122,0,.35);border-radius:8px;padding:5px 12px;cursor:pointer;font-family:var(--ui)}
.cfbtn:hover{background:rgba(255,122,0,.18)}
.adok{color:var(--green);font-size:12px} .adbad{color:var(--red);font-size:12px}
/* layout */
.layout{display:flex;gap:16px;margin-top:14px;align-items:flex-start}
.side{width:188px;flex:0 0 188px;display:flex;flex-direction:column;gap:8px;position:sticky;top:8px}
.navbtn{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:var(--mut);cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;text-align:left;transition:all .12s}
.navbtn:hover{border-color:#3a4050;color:var(--txt)}
.navbtn.on{background:linear-gradient(135deg,rgba(255,122,0,.16),rgba(255,122,0,.06));border-color:var(--orange);color:#ffd9b0}
.navbtn .ic{font-size:16px}
.navbtn small{display:block;font-size:10.5px;font-weight:500;color:var(--mut2);margin-top:2px}
.content{flex:1;min-width:0}
.screen{display:none}
.screen.on{display:block}
/* cards / kpis */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.kgroup{margin-bottom:8px}
.kgt{font-family:var(--disp);font-size:13px;font-weight:600;color:var(--txt);margin:4px 0 8px;display:flex;align-items:baseline;gap:8px}
.kgh{font-size:11px;font-weight:400;color:var(--mut2)}
.cbadge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}
.cbadge.ok{background:rgba(67,181,129,.16);color:var(--green);border:1px solid rgba(67,181,129,.35)}
.cbadge.warn{background:rgba(255,170,40,.14);color:var(--amber);border:1px solid rgba(255,170,40,.35)}
.lifecycle{display:flex;align-items:stretch;gap:6px;flex-wrap:wrap;margin-top:8px}
.lcs{flex:1;min-width:130px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 10px;text-align:center}
.lcl{font-size:11px;color:var(--mut2)}
.lcv{font-family:var(--disp);font-size:19px;font-weight:600;margin:3px 0;color:var(--txt)}
.lcv.g{color:var(--green)} .lcv.a{color:var(--amber)} .lcv.o{color:var(--orange)}
.lcsub{font-size:10.5px;color:var(--mut2);line-height:1.4}
.lca{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--mut2);min-width:54px}
.lcaT{font-size:9.5px;color:var(--mut2);margin-bottom:1px;white-space:nowrap}
.panel.hl{border-color:var(--orange);box-shadow:0 0 0 1px rgba(255,122,0,.25)}
.dlbtn{float:right;font-size:11.5px;font-weight:600;color:var(--orange);background:rgba(255,122,0,.10);border:1px solid rgba(255,122,0,.35);border-radius:8px;padding:4px 10px;cursor:pointer;font-family:var(--ui)}
.dlbtn:hover{background:rgba(255,122,0,.18)}
.kc{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 15px;border-left:3px solid var(--blue)}
.kc.o{border-left-color:var(--orange)}.kc.g{border-left-color:var(--green)}.kc.v{border-left-color:var(--violet)}.kc.a{border-left-color:var(--amber)}
.kc .lab{font-size:11px;color:var(--mut2);margin-bottom:6px;letter-spacing:.3px}
.kc .val{font-family:var(--disp);font-size:24px;font-weight:700;line-height:1.05}
.kc .sub{font-size:11px;color:var(--mut);margin-top:4px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.panel h3{font-family:var(--disp);font-size:15px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.panel .hint{font-size:11px;color:var(--mut2);font-weight:400}
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:980px){.cols2{grid-template-columns:1fr}.layout{flex-direction:column}.side{width:100%;flex:none;flex-direction:row;flex-wrap:wrap;position:static}.navbtn{flex:1;min-width:140px}}
/* budget bar */
.bar{display:flex;height:30px;border-radius:9px;overflow:hidden;margin:12px 0 8px;border:1px solid var(--line)}
.seg{display:flex;align-items:center;padding:0 9px;font-size:10.5px;white-space:nowrap;overflow:hidden}
.seg.v{background:linear-gradient(90deg,#FF7A00,#FF9A3D);color:#1a1100;font-weight:600}
.seg.vrest{background:repeating-linear-gradient(45deg,#3a2a14,#3a2a14 6px,#332512 6px,#332512 12px);color:#d8b483}
.seg.ex{background:linear-gradient(90deg,#2f6fb0,#5a9bd8);color:#04111f;font-weight:600}
.seg.exrest{background:repeating-linear-gradient(45deg,#16202e,#16202e 6px,#141d29 6px,#141d29 12px);color:#7fa9e8}
.legend{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:var(--mut)}
.legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle}
/* table */
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;color:var(--mut2);font-weight:600;font-size:11px;padding:7px 8px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:.4px}
td{padding:8px;border-bottom:1px solid rgba(43,47,60,.5)}
td.num,th.num{text-align:right;font-family:var(--mono)}
tr:hover td{background:rgba(255,255,255,.02)}
.tag{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600}
.tag.win{background:rgba(67,181,129,.15);color:#7fd6a8}.tag.lose{background:rgba(229,86,78,.15);color:#f0a39d}.tag.neg{background:rgba(229,86,78,.18);color:#f0a39d}
/* RM bars */
.brow{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:12.5px}
.brow .nm{width:90px;flex:0 0 90px;color:var(--txt)}
.brow .tk{flex:1;height:9px;background:var(--panel2);border-radius:5px;overflow:hidden}
.brow .fl{height:100%;background:linear-gradient(90deg,#FF7A00,#FF9A3D);border-radius:5px}
.brow .vv{width:70px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--mut)}
.toggle{display:inline-flex;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:3px}
.toggle button{padding:5px 12px;border:0;border-radius:7px;background:transparent;color:var(--mut);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.toggle button.on{background:var(--orange);color:#1a1100}
.foot{font-size:11px;color:var(--mut2);margin-top:14px}
.muted{color:var(--mut2)}
.big{font-family:var(--disp);font-weight:700}
.pos{color:#7fd6a8}.negv{color:#f0a39d}
</style>
</head>

<div class="wrap">
 <div class="top">
  <div class="logo">D</div>
  <div><div class="h1">结算指挥台</div><div class="sub">DiDi Alianza · 世界杯激励 · 成本中台</div></div>
  <div class="spacer"></div>
  <div class="wksel"><span id="wkSelLbl">结算周</span> <select id="wkSel"></select></div>

 <div id="cheatFixWrap" style="margin:8px 0 4px">

 </div>
 <div class="layout">
  <div class="side">
   <button class="navbtn on" data-s="ov" onclick="goScreen('ov')"><span class="ic">📊</span><span>成本总览<small>燃尽 · 单均 · 城市</small></span></button>
   <button class="navbtn" data-s="pool" onclick="goScreen('pool')"><span class="ic">🏆</span><span>奖金池分析<small>RM · 排行 · 胜率</small></span></button>

  </div>
  <div class="content">
   <div class="screen on" id="scrOv"></div>
   <div class="screen" id="scrPool"></div>
   <div class="screen" id="scrPts"></div>
  </div>
 </div>

function vendorOf(last8, c8, e){
  const k = String(c8).slice(-8);
  if(last8[k]) return last8[k];
  const rid = String((e&&e.rider_id)||'').trim();
  if(rid && last8[rid.slice(-8)]) return last8[rid.slice(-8)];
  // 兜底：roster/perf 里查不到时，直接用骑手自带的 vendor_code（不依赖经常不更新的 vendor 清单）
  const vc = String((e&&e.vendor_code)||'').trim();

// ===== 核心：按周构建 M =====
// ═══ 结算端防线：存档查重（防刷分二道关）═══
// score_archive 由算分页生成；正常情况下算分页已按「最早报名为准」去重。
// 但若喂进来的是去重前的旧存档，同一 rider 可能出现在同场多支队 → 池/积分被重复计入。
// 本函数对存档做一次防御性去重：每个 rider 在同一场只保留一个实例（优先获胜队、其次数组靠前），
// 并产出被剔除明细供页面红条提醒。注意：是否真正套用到计算，由 buildM 按「未结算→套用 / 已结算→只提醒不改数」决定。
function _rid(id){ var s=String(id==null?'':id).trim().replace(/\.0+$/,''); if(/e/i.test(s)){var n=parseFloat(s);if(!isNaN(n)&&n>0)s=Math.round(n).toString();} return s; }
function dedupArchiveRiders(saRaw){
  var dupes=[]; var clean={};
  Object.keys(saRaw||{}).forEach(function(m){
    var teams=(saRaw[m]||[]);
    var keep={}; // normRid -> {idx, win}
    teams.forEach(function(t,ti){
      var win=!!(t&&t.result==='胜');
      ((t&&t.riders)||[]).forEach(function(r){
        if(!r||r.id==null) return; var k=_rid(r.id);
        if(keep[k]==null){ keep[k]={idx:ti,win:win}; }
        else if(!keep[k].win && win){ keep[k]={idx:ti,win:win}; } // 升级到获胜队，保证其胜分被正确计一次
      });
    });
    clean[m]=teams.map(function(t,ti){
      if(!t) return t; var nt=Object.assign({},t);
      nt.riders=((t.riders)||[]).filter(function(r){
        if(!r||r.id==null) return true; var k=_rid(r.id); var kp=keep[k];
        if(kp && kp.idx===ti) return true;
        dupes.push({ match:String(m), riderId:String(r.id), vendor:(t.vendor||''), team:(t.name||t.team||''),
          keptVendor:((teams[kp.idx]&&teams[kp.idx].vendor)||''), keptTeam:((teams[kp.idx]&&(teams[kp.idx].name||teams[kp.idx].team))||''),
          droppedWinning:(t.result==='胜'), normal_total:+(r.normal_total||0), pk_bonus:+(r.pk_bonus||0) });
        return false;
      });
      return nt;
    });
  });
  return { clean:clean, dupes:dupes };
}

function buildM(weekKey){
  const W = WEEK_DEFS[weekKey];
  // 结算状态：写死已结算 或 运营在数据库 settled_weeks 里确认过 → 视为已结算
  const _settledList = Array.isArray(RAW['settled_weeks']) ? RAW['settled_weeks'] : (Array.isArray(RAW._settled)?RAW._settled:[]);
  const _wkSettled = wk => (!WEEK_DEFS[wk].unsettled) || _settledList.indexOf(wk)>=0;
  const unsettled = !_wkSettled(weekKey);
  const POOL = W.pool || POOL_PER_WEEK;
  const dates = W.dates;
  const dset = new Set(dates);
  const last8 = buildRiderVendor();
  const curp = RAW.curp_map || {};
  // 存档查重防线：未结算周套用去重后的存档（防止虚增的钱发出去）；已结算周只检测、不改已结算数字。
  const _saAudit = dedupArchiveRiders(RAW.score_archive || {});
  const sa = unsettled ? _saAudit.clean : (RAW.score_archive || {});
  const rmMap = RAW.vendor_rm || {};
  const rmvm = RAW.vendor_rmvm || {};
  const roster = RAW.vendor_roster || {};
  const city = RAW.vendor_city || {};
  // 城市兜底：vendor_city 查不到时，从 vendor_code 识别 CDMX/MTY；都没有才归"其它"
  function cityOf(vc){ if(!vc) return '其它'; if(city[vc]) return city[vc]; const u=norm(vc);
    if(u.indexOf('CDMX')>=0) return 'CDMX'; if(u.indexOf('MTY')>=0) return 'MTY'; return '其它'; }

  // 本周相关场次（按日期归入）
  const wkMatches = Object.keys(MATCH_DATE).filter(m=>dset.has(MATCH_DATE[m]));
  const matchDates = new Set(wkMatches.map(m=>MATCH_DATE[m]));   // 当周有比赛的日期
  // 计基础分的日子：热身日 或 无赛日（B口径：没比赛时全员当日基础分计入；正式赛日只算获胜队）
  const baseDay = d => isWarm(d) || !matchDates.has(d);

  // 容器
  const daily={}, pk={}, perday={}, played={}, won={}, ridersSet={}, activeSet={}, orders={}, hr={};
  const add=(o,k,v)=>{o[k]=(o[k]||0)+v;};
  const ensurePD=(vc,d)=>{ if(!perday[vc]) perday[vc]={}; if(perday[vc][d]==null) perday[vc][d]=0; };

  // 清零感知取分：被7天0单清零的骑手，清零日(含)之前的积分不计入 Vendor 成本/奖金池（流失）
  const dayPts=(e,d)=> (e&&e._clearDate&&d&&d<=e._clearDate) ? 0 : (+((e&&e._day&&e._day[d])||0));
  // 1) 热身日：全员基础分（按 vendor 汇总 _day / _dord / _dhr / 活跃）
  const warmDates = dates.filter(isWarm);
  const dayActive = {}; // 全网逐日活跃/单/时长
  dates.forEach(d=>dayActive[d]={active:0,orders:0,hr:0});
  for(const c8 in curp){ const e=curp[c8]; const vc=vendorOf(last8,c8,e);
    const day=e._day||{}, dord=e._dord||{}, dhr=e._dhr||{};
    let anyAct=false;
    dates.forEach(d=>{
      const p=dayPts(e,d), od=+(dord[d]||0), h=+(dhr[d]||0);
      if(p!==0||od!==0||h!==0){ dayActive[d].active++; anyAct=true; }
      dayActive[d].orders+=od; dayActive[d].hr+=h;
      if(vc){
        if(baseDay(d)){ add(daily,vc,p); ensurePD(vc,d); perday[vc][d]+=p; }
        add(orders,vc,od); add(hr,vc,h);
      }
    });
    if(vc){ if(!ridersSet[vc]) ridersSet[vc]=new Set(); ridersSet[vc].add(c8);
      if(anyAct){ if(!activeSet[vc]) activeSet[vc]=new Set(); activeSet[vc].add(c8); } }
  }

  // 2) 比赛（官方规则）：PK日，获胜队每个骑手的【当天日常积分 normal_total + PK积分 pk_bonus】计入奖金池；败队/未参赛不计。played/won 仅用于胜率统计。
  const pkByDay={}; dates.forEach(d=>pkByDay[d]={teams:0,wins:0}); const pkRiders=new Set();
  wkMatches.forEach(m=>{ const d=MATCH_DATE[m]; const teams=sa[m]||[];
    teams.forEach(t=>{ const vc=norm(t.vendor); if(!vc) return;
      pkByDay[d].teams++; add(played,vc,1);
      (t.riders||[]).forEach(r=>{ if(r&&r.id) pkRiders.add(String(r.id)); });
      const win = t.result==='胜';
      if(win){ add(won,vc,1); pkByDay[d].wins++;
        (t.riders||[]).forEach(r=>{ if(!r) return;
          const nt=+(r.normal_total||0), pb=+(r.pk_bonus||0);
          add(pk,vc,pb); ensurePD(vc,d); perday[vc][d]+=pb;
          if(!isWarm(d)){ add(daily,vc,nt); perday[vc][d]+=nt; }
        });
      }
    });
  });

  // 汇总
  const vset = new Set([...Object.keys(daily),...Object.keys(pk),...Object.keys(played)]);
  const totalRaw = {}; vset.forEach(v=>totalRaw[v]=(daily[v]||0)+(pk[v]||0));
  const grand = Object.values(totalRaw).reduce((a,b)=>a+b,0) || 1;   // 含负：仅作"周总分"展示口径
  // 负分兜底→0 后按占比分配（分母用兜底后合计，保证占比之和=100%、合计=池）
  const totalFloor={}; vset.forEach(v=>totalFloor[v]=Math.max(0,totalRaw[v]));
  const grandFloor = Object.values(totalFloor).reduce((a,b)=>a+b,0) || 1;
  const eligible=[...vset].filter(v=>totalFloor[v]>0);
  const rawAlloc={}, floorAlloc={}; let used=0;
  eligible.forEach(v=>{ rawAlloc[v]=totalFloor[v]/grandFloor*POOL; floorAlloc[v]=Math.floor(rawAlloc[v]); used+=floorAlloc[v]; });
  let rem=POOL-used;
  eligible.sort((a,b)=>(rawAlloc[b]-floorAlloc[b])-(rawAlloc[a]-floorAlloc[a]));
  const alloc={}; eligible.forEach(v=>alloc[v]=floorAlloc[v]); for(let i=0;i<rem&&i<eligible.length;i++) alloc[eligible[i]]++;

  // by_vendor
  const rmOf = vc => (rmvm[vc]&&rmvm[vc].rm) || rmMap[vc] || '未分配';
  let by_vendor = [...vset].map(vc=>({
    vc, mgr: rmOf(vc)||'未分配',
    daily: Math.round(daily[vc]||0), pk: Math.round(pk[vc]||0), total: Math.round(totalRaw[vc]||0),
    perday: perday[vc]||{}, played: played[vc]||0, won: won[vc]||0,
    riders: (ridersSet[vc]?ridersSet[vc].size:(roster[vc]||0)), active: (activeSet[vc]?activeSet[vc].size:0),
    orders: Math.round(orders[vc]||0), hr: Math.round(hr[vc]||0),
    win_rate: played[vc]? (won[vc]||0)/played[vc] : 0,
    share: (totalFloor[vc]||0)/grandFloor, alloc: alloc[vc]||0, city: cityOf(vc)
  }));
  by_vendor.sort((a,b)=> b.total-a.total);
  by_vendor.forEach((v,i)=>v.rank=i+1);

  // by_day 池总（日常+pk）
  const by_day={}; dates.forEach(d=>by_day[d]=0);
  by_vendor.forEach(v=>{ for(const d in v.perday) if(by_day[d]!=null) by_day[d]+=v.perday[d]; });
  Object.keys(by_day).forEach(d=>by_day[d]=Math.round(by_day[d]));

  // RM 维度
  const rmAgg={};
  by_vendor.forEach(v=>{ const k=v.mgr||'未分配'; if(!rmAgg[k]) rmAgg[k]={mgr:k,vendors:0,riders:0,active:0,alloc:0,total:0,played:0,won:0,orders:0};
    const a=rmAgg[k]; a.vendors++; a.riders+=v.riders; a.active+=v.active; a.alloc+=v.alloc; a.total+=v.total; a.played+=v.played; a.won+=v.won; a.orders+=v.orders; });
  const rm=Object.values(rmAgg).map(a=>({...a, win_rate: a.played? a.won/a.played:0})).sort((x,y)=>y.alloc-x.alloc);

  // 骑手维度
  let total_unique=0, total_orders=0, total_online_hr=0, online_riders=0;
  const distMap={}; for(let i=1;i<=7;i++) distMap[i]=0;
  for(const c8 in curp){ const e=curp[c8]; const day=e._day||{}; let dcnt=0,ord=0,h=0,any=false;
    const dord=e._dord||{}, dhr=e._dhr||{};
    dates.forEach(d=>{ const p=+(day[d]||0), od=+(dord[d]||0), hh=+(dhr[d]||0);
      if(p!==0||od!==0||hh!==0){dcnt++;any=true;} ord+=od; h+=hh; });
    total_unique++; total_orders+=ord; total_online_hr+=h;
    if(h>0) online_riders++;
    if(dcnt>=1 && dcnt<=7) distMap[dcnt]++;
  }
  const active_week=Object.values(dayActive).reduce((m,x)=>Math.max(m,x.active),0); // 近似：峰值活跃
  const riders={ total_unique, active_week:Object.keys(distMap).reduce((s,k)=>s+(k>='1'?0:0),0)||0,
    inactive_zero: total_unique - Object.values(distMap).reduce((a,b)=>a+b,0),
    by_day: dates.map(d=>({d:d.slice(5).replace('-','/'), active:dayActive[d].active, orders:Math.round(dayActive[d].orders), online_hr:Math.round(dayActive[d].hr)})),
    active_days_dist: distMap, active_all7: distMap[7]||0, active_ge5:(distMap[5]||0)+(distMap[6]||0)+(distMap[7]||0),
    total_orders: Math.round(total_orders), total_online_hr: Math.round(total_online_hr) };
  riders.active_week = Object.values(distMap).reduce((a,b)=>a+b,0); // 本周至少活跃1天

  // PK 维度
  let tt=0,tw=0; dates.forEach(d=>{tt+=pkByDay[d].teams; tw+=pkByDay[d].wins;});
  const pkAgg={ total_teams:tt, total_wins:tw, win_rate: tt? tw/tt:0, distinct_riders: pkRiders.size,
    participation_rate: total_unique? pkRiders.size/total_unique:0,
    by_day: dates.filter(d=>pkByDay[d].teams>0).map(d=>({d:d.slice(5).replace('-','/'),teams:pkByDay[d].teams,wins:pkByDay[d].wins})) };

  // 数据质量
  const merged = by_vendor.filter(v=>v.total>0).length;
  const negative = by_vendor.filter(v=>v.total<0).length;
  const unmapped_rm = by_vendor.filter(v=>!v.mgr||v.mgr==='未分配').length;

  // 兑换池：用安全汇总函数的结果（比索，累计口径）；函数没建/没授权时标记为待接入
  const ex = RAW._exchange;
  const exchange = ex ? {
      pool: BUDGET.exchange, available:true,
      paid: Math.round(+ex.paid||0), pending: Math.round(+ex.pending||0),
      remaining: Math.round(BUDGET.exchange-(+ex.paid||0)),
      redeemed_pts: Math.round(+ex.redeemed_pts||0), pending_pts: Math.round(+ex.pending_pts||0),
      redeemers: +ex.redeemers||0
    } : {
      pool: BUDGET.exchange, available:false,
      paid:0, pending:0, remaining:BUDGET.exchange, redeemed_pts:0, pending_pts:0, redeemers:0
    };
  const exPaid = exchange.paid;

  // ===== 成本/单均/账本扩展 =====
  const RATE = 0.5;
  const weekStart = dates[0];
  // 兑换归位：本周已兑付(按成本周) / 累计 / 待批 —— _redweek 是扁平数组 [{cost_week,kind,vendor_code,cash,pts,cnt}]
  const rb = RAW._redweek;
  const redeemByV={}, redeemAllByV={}, pendByV={};
  let redeemWeekCash=0, pendCash=0, pendPts=0;
  if(Array.isArray(rb)){
    rb.forEach(r=>{ const v=norm(r.vendor_code||''), cash=+(r.cash||0), pts=+(r.pts||0);
      if(r.kind==='completed'){ redeemAllByV[v]=(redeemAllByV[v]||0)+cash;
        if(r.cost_week===weekStart){ redeemByV[v]=(redeemByV[v]||0)+cash; redeemWeekCash+=cash; } }
      else if(r.kind==='pending'){ redeemAllByV[v]=redeemAllByV[v]||0;
        if(r.cost_week===weekStart){ pendByV[v]=(pendByV[v]||0)+cash; pendCash+=cash; pendPts+=pts; } }
    });
  }
  // 本周骑手发放积分（骑手维度）+ 按城市分摊 + 累计
  let issuedBase=0, issuedPK=0, cumOrdersAll=0;
  const cumByV={}, baseByCity={}, cumByCity={};
  for(const c8 in curp){ const e=curp[c8]; const vc=vendorOf(last8,c8,e);
    const day=e._day||{}; let b=0; dates.forEach(d=>{ b+=dayPts(e,d); }); issuedBase+=b;
    cumOrdersAll += (+ (e.total_complete_orders||0));
    if(vc){ cumByV[vc]=(cumByV[vc]||0)+(+ (e.cumulative_pts||0));
      const ct=cityOf(vc); baseByCity[ct]=(baseByCity[ct]||0)+b; cumByCity[ct]=(cumByCity[ct]||0)+(+ (e.cumulative_pts||0)); }
  }
  const pkByCity={};
  wkMatches.forEach(m=>{ (sa[m]||[]).forEach(t=>{ const vc=norm(t.vendor), ct=cityOf(vc);
    (t.riders||[]).forEach(r=>{ const pb=+(r.pk_bonus||0); issuedPK+=pb; pkByCity[ct]=(pkByCity[ct]||0)+pb; }); }); });
  const issuedPts = Math.round(issuedBase + issuedPK);
  const ordersWk = total_orders;   // 全口径：用全体骑手完单(含未归属vendor的)，不因清单不全而少计
  const hoursWk  = Object.values(hr).reduce((a,b)=>a+b,0);
  const poolSpent = POOL;
  const ptsAccrued = Math.round(pendCash);     // 待审批兑付(pending)实际现金
  const ptsCostA = Math.round(issuedPts*RATE); // 本周积分计提成本(权责)
  const cashRedeem = Math.round(redeemWeekCash); // 本周已批兑付(现金)
  // 两套口径
  const accrualTotal = poolSpent + ptsCostA;   // 计提口径：奖金池 + 积分计提
  const cashTotal    = poolSpent + cashRedeem; // 实付口径：奖金池 + 已批兑付
  const settled = !unsettled;
  const mainTotal = settled ? cashTotal : accrualTotal;  // 未结算→计提 · 已结算→实付
  const costModel = {
    settled,
    pool: poolSpent,
    accrual: { pts_cost: ptsCostA, total: accrualTotal, cpo: ordersWk? +(accrualTotal/ordersWk).toFixed(2):null },
    cash:    { redeem: cashRedeem, total: cashTotal,    cpo: ordersWk? +(cashTotal/ordersWk).toFixed(2):null },
    pending: ptsAccrued,
    main_total: mainTotal,
    main_basis: settled ? 'cash' : 'accrual',
    issued_pts: issuedPts, redeemed_pts_wk: Math.round((Array.isArray(rb)? rb.filter(r=>r.kind==='completed'&&r.cost_week===weekStart).reduce((a,r)=>a+(+r.pts||0),0):0))
  };
  const cpo = {
    orders: Math.round(ordersWk), hours: Math.round(hoursWk), issued_pts: issuedPts,
    pool_cpo:   ordersWk? +(poolSpent/ordersWk).toFixed(2) : null,
    points_cpo: ordersWk? +(ptsCostA/ordersWk).toFixed(2) : null,
    accrual_cpo: ordersWk? +(accrualTotal/ordersWk).toFixed(2) : null,
    cash_cpo:    ordersWk? +(cashTotal/ordersWk).toFixed(2) : null,
    total_cpo:  ordersWk? +(mainTotal/ordersWk).toFixed(2) : null,
    redeem_cpo: ordersWk? +(cashRedeem/ordersWk).toFixed(2) : null,
    cum_orders: Math.round(cumOrdersAll),
    online_riders: online_riders,
    hr_per_rider_day: (online_riders && dates.length)? +(hoursWk/online_riders/dates.length).toFixed(1) : null
  };
  // 按城市：奖金池/积分/兑换成本 + 单均
  const cityAgg={};
  by_vendor.forEach(v=>{ const ct=cityOf(v.vc); if(!cityAgg[ct]) cityAgg[ct]={city:ct,vendors:0,alloc:0,orders:0,riders:0,redeem:0};
    const a=cityAgg[ct]; a.vendors++; a.alloc+=v.alloc; a.orders+=v.orders; a.riders+=v.riders; a.redeem+=(redeemByV[norm(v.vc)]||0); });
  const by_city=Object.values(cityAgg).map(a=>{ const issued=Math.round((baseByCity[a.city]||0)+(pkByCity[a.city]||0)); const ptsCost=Math.round(issued*RATE);
    return {...a, issued_pts:issued, pts_cost:ptsCost, pool_cost:a.alloc,
      total_cpo: a.orders? +((a.alloc+ptsCost)/a.orders).toFixed(2):null,
      redeem_cpo: a.orders? +(a.redeem/a.orders).toFixed(2):null }; }).sort((x,y)=>y.alloc-x.alloc);
  // 按板块：本周实际成本 = 奖金池 + 本周已兑付；待同意计提单列
  const actualCost = poolSpent + Math.round(redeemWeekCash);
  const by_board=[
    {name:'Vendor 奖金池', spent: poolSpent, note:'本周已发', kind:'cost'},
    {name:'骑手兑换(本周已兑付)', spent: Math.round(redeemWeekCash), note:'本周归集·周一批准上周积分', kind:'cost'},
    {name:'本周实际成本合计', spent: actualCost, note:'奖金池+本周兑付', kind:'total'},
    {name:'待审批兑付(预告)', spent: ptsAccrued, note:'骑手已申请·待你批准转现金·不计入合计', kind:'memo'}
  ];
  // 预估
  let projected=null;
  if(unsettled){ const daysWithData=dates.filter(d=>Object.values(curp).some(e=>(e._day&&e._day[d]!=null))).length || 1;
    projected={ days_done:daysWithData, pool_proj: Math.round(poolSpent), pts_proj: Math.round(issuedPts*RATE/daysWithData*7) }; }
  // 骑手积分账本：本周日常/PK/发生额 · 本周兑换 · 待同意 · 累计发放 · 当前余额
  const ledger = by_vendor.map(v=>{ const nv=norm(v.vc); const gross=Math.round(cumByV[v.vc]||0);
    const redAll=Math.round(redeemAllByV[nv]||0); const pend=Math.round(pendByV[nv]||0);
    return { vc:v.vc, mgr:v.mgr, city:cityOf(v.vc), daily:v.daily, pk:v.pk, occur:v.daily+v.pk,
      redeem_wk:Math.round(redeemByV[nv]||0), pending:pend, gross:gross, redeemed:redAll,
      balance: gross-redAll-pend, riders:v.riders }; });
  // RM 胜率
  const rmWin = rm.map(x=>({ mgr:x.mgr, played:x.played, won:x.won, win_rate:x.win_rate, alloc:x.alloc, vendors:x.vendors }));
  const settledWeeks = Object.keys(WEEK_DEFS).filter(wk=>_wkSettled(wk)).length;
  const vendorUsedCum = Object.keys(WEEK_DEFS).filter(wk=>_wkSettled(wk)).reduce((a,wk)=>a+(WEEK_DEFS[wk].pool||0),0);
  const budgetProgress = { vendor_used: vendorUsedCum, vendor_total: BUDGET.vendor_pool,
    exchange_used: (exchange.paid||0), exchange_total: BUDGET.exchange, settled_weeks: settledWeeks };

  // 期初/期末链（毛累计=当前累计−后续周发放；净余额再减累计兑换）
  let totalCum=0; for(const c8 in curp){ totalCum += (+ (curp[c8].cumulative_pts||0)); }
  if(!RAW.__issuedByWeek){ RAW.__issuedByWeek={};
    Object.keys(WEEK_DEFS).forEach(wk=>{ const wd=WEEK_DEFS[wk]; const ds2=new Set(wd.dates);
      let bb=0; for(const c8 in curp){ const dd=curp[c8]._day||{}; wd.dates.forEach(d=>{ bb+=dayPts(curp[c8],d); }); }
      let pp=0; Object.keys(MATCH_DATE).filter(m=>ds2.has(MATCH_DATE[m])).forEach(m=>{ (sa[m]||[]).forEach(t=>{ (t.riders||[]).forEach(r=>{ pp+=(+ (r.pk_bonus||0)); }); }); });
      RAW.__issuedByWeek[wk]=Math.round(bb+pp); });
  }
  const wkOrder=Object.keys(WEEK_DEFS); const myIdx=wkOrder.indexOf(weekKey);
  let laterSum=0; for(let i=myIdx+1;i<wkOrder.length;i++) laterSum+=(RAW.__issuedByWeek[wkOrder[i]]||0);
  const endGross=Math.round(totalCum-laterSum), openGross=Math.round(endGross-issuedPts);
  let redeemCumPrev=0; if(Array.isArray(rb)) rb.forEach(r=>{ if(r.kind==='completed' && r.cost_week<weekStart) redeemCumPrev+=(+r.cash||0); });
  const openNet=Math.round(openGross-redeemCumPrev), endNet=Math.round(endGross-redeemCumPrev-redeemWeekCash);
  const ledgerSummary={ open:openNet, occur:issuedPts, redeem:Math.round(redeemWeekCash), pending:Math.round(pendCash), end:endNet,
    open_gross:openGross, end_gross:endGross, total_cum:Math.round(totalCum) };

  return {
    week: weekKey, label: W.label, unsettled: unsettled,
    dates: dates.map(d=>d.slice(5).replace('-','/')),
    generated: new Date().toISOString().slice(0,19), points_basis:'points',
    budget: BUDGET, exchange,
    cost: { vendor_pool_spent: POOL, exchange_spent: Math.round(exPaid), pt_spent:null, total_spent: POOL + Math.round(exPaid) },
    cpo, costModel, by_city, by_board, projected, ledger, ledgerSummary, rmWin, budgetProgress,
    issued: { pts: issuedPts, base: Math.round(issuedBase), pk: Math.round(issuedPK), rate: RATE, accrued: ptsAccrued, pending_pts: Math.round(pendPts) },
    redeem: { week_paid: Math.round(redeemWeekCash), pending: Math.round(pendCash), pending_pts: Math.round(pendPts), week_start: weekStart, available: !!rb },
    vendor_pool: { amount: POOL, distributed: Object.values(alloc).reduce((a,b)=>a+b,0),
      vendors: merged, total_points: Math.round(grand), by_vendor, by_day },
    rm, riders: riders, pk: pkAgg,
    data_quality: { raw_vendor_codes: vset.size, merged_vendors: merged, dup_groups: 0, negative_vendors: negative, unmapped_rm },
    archiveDupes: _saAudit.dupes.filter(x=> wkMatches.indexOf(String(x.match))>=0),
    archiveDupApplied: unsettled,
    pending: { exchange:'待兑换申请数据', pt:'待PT计价与数据' }
  };
}

function exportCumulativeCostCSV(){
  if(typeof WEEK_DEFS==='undefined'){ return; }
  const esc=v=>{ const s=String(v==null?'':v); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  const ri=n=>(n==null?'':Math.round(n));
  const r2=n=>(n==null?'':(Math.round(n*100)/100).toFixed(2));
  const lines=[];
  const sec=t=>{ lines.push(''); lines.push(esc('【'+t+'】')); };
  const row=arr=>lines.push(arr.map(esc).join(','));

  // 逐周取模型（getM 带缓存）；累计成本只计「已发生」的周——有完单或已结算，
  // 否则未来周的计划奖金池会把累计成本虚高
  const wkKeys=Object.keys(WEEK_DEFS);
  const allModels=wkKeys.map(k=>{ try{ return getM(k); }catch(e){ return null; } }).filter(Boolean);
  const models=allModels.filter(M=>((M.cpo&&M.cpo.orders>0) || (M.costModel&&M.costModel.settled)));
  if(!models.length){ return; }
  const skipped=allModels.length-models.length;

  row(['DiDi Alianza · 累计成本导出']);
  row(['生成时间', (models[0]&&models[0].generated)||'', '已发生周数', models.length, '口径', '逐周自动取（已结算→实付 / 未结算→计提暂估）']);
  if(skipped>0) row(['注', '已跳过 '+skipped+' 个尚无完单数据的未来周（计划奖金池未发生，不计入累计成本）']);

  // ① 各周成本汇总 + 累计合计
  sec('各周成本汇总');
  row(['周','区间','结算状态','主口径总成本','奖金池','实付兑换','积分计提','计提总成本','实付总成本','本周完单','主口径单均']);
  const cum={pool:0,redeem:0,accrual_pts:0,accrual_total:0,cash_total:0,orders:0,main_total:0};
  models.forEach(M=>{
    const cm=M.costModel, orders=M.cpo.orders||0;
    const mainTotal=cm.main_total, mainCpo=cm.settled?cm.cash.cpo:cm.accrual.cpo;
    const lbl=M.label.split('·'), wk=(lbl[0]||M.week).trim(), rng=(lbl[1]||'').trim();
    row([wk, rng, cm.settled?'已结算':'未结算', ri(mainTotal), ri(cm.pool), ri(cm.cash.redeem), ri(cm.accrual.pts_cost), ri(cm.accrual.total), ri(cm.cash.total), ri(orders), r2(mainCpo)]);
    cum.pool+=cm.pool||0; cum.redeem+=cm.cash.redeem||0; cum.accrual_pts+=cm.accrual.pts_cost||0;
    cum.accrual_total+=cm.accrual.total||0; cum.cash_total+=cm.cash.total||0; cum.orders+=orders; cum.main_total+=mainTotal||0;
  });
  const cumCpo=cum.orders?cum.main_total/cum.orders:null;
  row(['累计合计','—','—', ri(cum.main_total), ri(cum.pool), ri(cum.redeem), ri(cum.accrual_pts), ri(cum.accrual_total), ri(cum.cash_total), ri(cum.orders), r2(cumCpo)]);
  lines.push('');
  row(['说明：主口径总成本 = 各周界面头部显示的总成本（已结算按实付、未结算按计提暂估）。累计单均 = 累计主口径总成本 ÷ 累计完单。']);

  // ② 累计成本 · 按城市（跨周汇总）
  sec('累计成本 · 按城市');
  row(['城市','完单','奖金池','积分成本','兑换成本','累计总成本','累计单均']);
  const cityAgg={};
  models.forEach(M=>{
    (M.by_city||[]).forEach(c2=>{
      const k=c2.city||'其它';
      if(!cityAgg[k]) cityAgg[k]={city:k,orders:0,alloc:0,pts_cost:0,redeem:0};
      const a=cityAgg[k]; a.orders+=c2.orders||0; a.alloc+=c2.alloc||0; a.pts_cost+=c2.pts_cost||0; a.redeem+=c2.redeem||0;
    });
  });
  const cityRows=Object.values(cityAgg).sort((a,b)=>(b.alloc+b.pts_cost+b.redeem)-(a.alloc+a.pts_cost+a.redeem));
  const ct={orders:0,alloc:0,pts_cost:0,redeem:0};
  cityRows.forEach(a=>{
    const tot=a.alloc+a.pts_cost+a.redeem, cpo=a.orders?tot/a.orders:null;
    row([a.city, ri(a.orders), ri(a.alloc), ri(a.pts_cost), ri(a.redeem), ri(tot), r2(cpo)]);
    ct.orders+=a.orders; ct.alloc+=a.alloc; ct.pts_cost+=a.pts_cost; ct.redeem+=a.redeem;
  });
  const ctTot=ct.alloc+ct.pts_cost+ct.redeem, ctCpo=ct.orders?ctTot/ct.orders:null;
  row(['合计', ri(ct.orders), ri(ct.alloc), ri(ct.pts_cost), ri(ct.redeem), ri(ctTot), r2(ctCpo)]);
  lines.push('');
  row(['说明：按城市累计总成本 = 各周奖金池 + 积分成本 + 兑换成本 跨周相加；兑换成本经 rider_id 反查 vendor 归集到城市。']);

  const csv='\ufeff'+lines.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='累计成本_共'+models.length+'周.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function renderPts(M){
  const ls=M.ledgerSummary, iss=M.issued;
  // 期初 → +发生 → −兑换 → 期末（净余额链）
  const step=(lab,val,cls,op)=>`<div style="flex:1;min-width:120px;text-align:center;padding:12px 8px;background:var(--panel2);border:1px solid var(--line);border-radius:11px">
     <div style="font-size:11px;color:var(--mut2)">${lab}</div><div class="big ${cls||''}" style="font-size:20px;margin-top:3px">${op||''}${n0(val)}</div></div>`;
  const arrow='<div style="display:flex;align-items:center;color:var(--mut2);font-size:18px;padding:0 2px">→</div>';
  let html=`<div class="panel"><h3>骑手积分账本 · 净余额链 <span class="hint">${M.label}${M.unsettled?' · 未结算':''}</span></h3>

      ${step('期初余额',ls.open)}${arrow}${step('本周发生',ls.occur,'pos','+')}${arrow}${step('本周兑换',ls.redeem,'negv','−')}${arrow}${step('期末余额',ls.end,'',' = ')}
    </div>
    <div style="font-size:11.5px;color:var(--mut2);margin-top:8px">净余额 = 累计发放 − 累计兑换 · 本周发生(日常 ${n0(iss.base)} + PK ${n0(iss.pk)}) · 待批 ${money(ls.pending)} 比索（下周一审批后转兑换）· 历史周期初/期末由当前累计反推，从下周起按快照更精确</div>
  </div>`;

  html+=`<div class="panel"><h3>按维度拆分 <span class="hint">兑换经 rider_id 反查 vendor 归集</span></h3>
    <div class="toggle"><button class="${_ptsDim==='vendor'?'on':''}" onclick="setPtsDim('vendor')">By Vendor</button><button class="${_ptsDim==='rm'?'on':''}" onclick="setPtsDim('rm')">By RM</button></div>`;

// 历史刷分积分修正报告（按骑手后8位汇总）
// 扫 score_archive 全量重复 → 按后8位聚合每人被虚增分 → 关联 curp_map.cumulative_pts
// → 算出「修正后累计」。仅扣【已结算周】的虚增（这些已进累计/池已付）；未结算周单列提醒走源头重生成。
// 只产报告 + 可下载对账表，不写库、不静默改数。
// ⚠️ 限制：兑换为隐私汇总口径，本页拿不到「单个骑手已兑多少」，故无法在骑手粒度判定已兑/未兑；
//    报告给出「应扣减额」与「异常(虚增>当前累计)」标记，已兑掉的部分需到兑换后台核对高虚增骑手。
// ═══════════════════════════════════════════════════════════════════
function _t(zh,en){ return (typeof SLANG!=='undefined'&&SLANG==='en')?en:zh; }
function _weekOfMatch(m){
  if(typeof MATCH_DATE==='undefined') return null;
  var d=MATCH_DATE[String(m)]; if(!d) return null; var hit=null;
  Object.keys(WEEK_DEFS).forEach(function(wk){ if((WEEK_DEFS[wk].dates||[]).indexOf(d)>=0) hit=wk; });
  return hit;
}
function _isWkSettled(wk){
  if(!wk||!WEEK_DEFS[wk]) return false;
  var list=Array.isArray(RAW['settled_weeks'])?RAW['settled_weeks']:[];
  return (!WEEK_DEFS[wk].unsettled) || list.indexOf(wk)>=0;
}
function buildCheatCorrectionReport(){
  var audit=dedupArchiveRiders(RAW.score_archive||{});
  var last8=buildRiderVendor();
  var curp=RAW.curp_map||{};
  var RATE=0.5;
  var perRider={}, perVendor={};
  audit.dupes.forEach(function(x){
    var c8=_rid(x.riderId).slice(-8);
    var wk=_weekOfMatch(x.match);
    var wlabel=wk?(WEEK_DEFS[wk].label.split('·')[0].trim()):'?';
    var settled=_isWkSettled(wk);
    var pts=(x.normal_total||0)+(x.pk_bonus||0);
    if(!perRider[c8]) perRider[c8]={c8:c8,vendor:(last8[c8]||norm(x.vendor)||''),byWeek:{},settledExcess:0,unsettledExcess:0};
    var pr=perRider[c8]; pr.byWeek[wlabel]=(pr.byWeek[wlabel]||0)+pts;
    if(settled) pr.settledExcess+=pts; else pr.unsettledExcess+=pts;
    var cv=norm(x.vendor)||'(空)';
    if(!perVendor[cv]) perVendor[cv]={vendor:cv,riders:{},settledExcess:0,unsettledExcess:0};
    perVendor[cv].riders[c8]=1;
    if(settled) perVendor[cv].settledExcess+=pts; else perVendor[cv].unsettledExcess+=pts;
  });
  var rows=Object.keys(perRider).map(function(c8){
    var pr=perRider[c8]; var cur=+(((curp[c8]||{}).cumulative_pts)||0);
    var ded=pr.settledExcess; var corrected=Math.max(0,cur-ded); var anomaly=(ded>cur);
    return {c8:c8,vendor:pr.vendor,current:Math.round(cur),settledExcess:Math.round(ded),
      unsettledExcess:Math.round(pr.unsettledExcess),corrected:Math.round(corrected),
      actualDeduct:Math.round(cur-corrected),anomaly:anomaly,byWeek:pr.byWeek,inCurp:(curp[c8]!=null)};
  }).sort(function(a,b){return b.settledExcess-a.settledExcess;});
  var ex=RAW._exchange||{};
  return {
    rows:rows,
    perVendor:Object.keys(perVendor).map(function(k){return perVendor[k];}).sort(function(a,b){return b.settledExcess-a.settledExcess;}),
    RATE:RATE,
    totSettled:Math.round(rows.reduce(function(s,r){return s+r.settledExcess;},0)),
    totUnsettled:Math.round(rows.reduce(function(s,r){return s+r.unsettledExcess;},0)),
    totRecoverable:Math.round(rows.reduce(function(s,r){return s+r.actualDeduct;},0)),
    anomalies:rows.filter(function(r){return r.anomaly;}).length,
    notInCurp:rows.filter(function(r){return !r.inCurp;}).length,
    exchange:{redeemed_pts:Math.round(+ex.redeemed_pts||0),pending_pts:Math.round(+ex.pending_pts||0)}
  };
}

function selfCheckWeek(k){ try{ var W=WEEK_DEFS[k]||{}; var pool=W.pool||0; var wname=(W.label||k).split(' ')[0]; var m=getM(k); var d=m.vendor_pool.distributed; var ok=Math.abs(d-pool)<1; if(ok) setBanner(SLANG==='en'?('🟢 Self-check OK · '+wname+' pool fully distributed = '+pool.toLocaleString()+' · engine OK (note: live totals shift with clears/scope changes, which is normal)'):('🟢 自检通过 · '+wname+' 奖金池分配合计 = '+pool.toLocaleString()+' · 引擎正常（注：现算总分会随清零/口径调整而变动，属正常）'),'ok'); else setBanner(SLANG==='en'?('🔴 Self-check anomaly: '+wname+' pool distributed = '+d.toLocaleString()+' ≠ '+pool.toLocaleString()):('🔴 自检异常：'+wname+' 奖金池分配 = '+d.toLocaleString()+'，不等于 '+pool.toLocaleString()),'bad'); }catch(e){ setBanner('🔴 '+e.message,'bad'); } }
function selfCheckW1(){ return selfCheckWeek('wk0601'); }
function _dashTodayISO(){ try{ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }catch(e){ return ''; } }
function _defaultWeekKey(){ var t=_dashTodayISO(); var keys=Object.keys(WEEK_DEFS); for(var i=0;i<keys.length;i++){ if((WEEK_DEFS[keys[i]].dates||[]).indexOf(t)>=0) return keys[i]; } return keys[keys.length-1]; }
function showWeek(k){ window.__curWk=k; var m=getM(k); selfCheckWeek(k); renderAll(m); flagUnsettled(m); flagArchiveDupes(m); reportH(); setTimeout(reportH,400); setTimeout(reportH,1200); }
async function boot(){ setBanner('⏳ 正在连接数据库并现算…','warn'); try{ await fetchBlocks(); var sel=document.getElementById('wkSel'); sel.innerHTML=''; Object.keys(WEEK_DEFS).forEach(function(k){ var o=document.createElement('option'); o.value=k; o.textContent=WEEK_DEFS[k].label; sel.appendChild(o); }); var _dw=_defaultWeekKey(); sel.value=_dw; sel.addEventListener('change',function(e){ showWeek(e.target.value); });
  var initLang='zh'; try{ initLang=localStorage.getItem('didi_dash_lang')||localStorage.getItem('didi_lang')||'zh'; }catch(e){}
  if(typeof applySettleLang==='function'){ SLANG=(initLang==='zh')?'zh':'en'; try{document.body.setAttribute('data-lang',SLANG);}catch(_){ } }
  window.__curWk=_dw; showWeek(_dw); goScreen('ov');
  if(typeof applySettleLang==='function' && SLANG==='en'){ applySettleLang('en'); }
  }catch(e){ setBanner('🔴 '+( (typeof SLANG!=='undefined'&&SLANG==='en')?'DB load failed: ':'读取数据库失败：')+e.message,'bad'); reportH(); console.error(e); }
}
window.addEventListener('message', function(e){ if(e&&e.data&&e.data.t==='lang' && typeof applySettleLang==='function'){ applySettleLang(e.data.lang); } });
window.addEventListener('resize', reportH);
try{ if(window.ResizeObserver){ var _ro=new ResizeObserver(function(){ reportH(); }); var _w=document.querySelector('.wrap'); if(_w) _ro.observe(_w); } }catch(e){}
if(window.supabase&&window.supabase.createClient){ boot(); } else { var t=setInterval(function(){ if(window.supabase&&window.supabase.createClient){ clearInterval(t); boot(); } },150); setTimeout(function(){ if(!window.supabase){ setBanner('🔴 supabase-js 没加载成功','bad'); reportH(); } },6000); }
